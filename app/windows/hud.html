<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Game Helper — HUD</title>
  <style>
    :root { --bg-alpha:0.9; --line:#2a3040; --label:#8b93a7; --game:#48d597; }
    * { box-sizing:border-box; }
    html,body { height:100%; }
    body { margin:0; font-family:'Segoe UI',sans-serif; overflow:hidden; background:transparent; }
    /* One line, in-game-metrics style: gray LABEL: white value. */
    .bar { display:inline-flex; align-items:center; gap:14px; padding:4px 10px;
           white-space:nowrap; background:rgba(16,18,24,var(--bg-alpha)); border-radius:7px; -webkit-app-region:drag; }
    .bar::-webkit-scrollbar { height:0; }
    .f { white-space:nowrap; flex:0 0 auto; }
    .f .l { color:var(--label); font-size:11px; text-transform:uppercase; letter-spacing:.4px; }
    .f .v { color:#fff; font-weight:600; font-size:13px; margin-left:5px; }
    .f .v.ok { color:var(--game); }
    .f .v.warn { color:#ffcf5a; }
    .flag { width:15px; height:11px; vertical-align:-1px; margin-right:4px; border-radius:2px; }
    .x { -webkit-app-region:no-drag; margin-left:auto; flex:0 0 auto; background:rgba(36,42,56,var(--bg-alpha));
         color:#e6e9f0; border:1px solid var(--line); border-radius:5px; padding:3px 7px; cursor:pointer; font-size:11px; }
  </style>
</head>
<body>
  <div class="bar">
    <span class="f"><span class="l">Game:</span><span class="v" id="s-game">—</span></span>
    <span class="f"><span class="l">Match:</span><span class="v" id="s-match">—</span></span>
    <span class="f"><span class="l">Players:</span><span class="v" id="s-players">—</span></span>
    <span class="f"><span class="l">Squad:</span><span class="v" id="s-squad">—</span></span>
    <span class="f"><span class="l">Server:</span><span class="v" id="s-server">—</span></span>
    <span class="f"><span class="l">Ping:</span><span class="v" id="s-ping">—</span></span>
    <span class="f"><span class="l">Lobby:</span><span class="v" id="s-lobby">—</span></span>
    <span class="f"><span class="l">Party:</span><span class="v" id="s-party">—</span></span>
    <span class="f"><span class="l">API:</span><span class="v" id="s-status">—</span></span>
    <button class="x" id="close">✕</button>
  </div>
  <script src="../js/hud.js"></script>
</body>
</html>
