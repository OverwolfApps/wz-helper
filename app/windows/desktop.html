<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Warzone Helper</title>
  <style>
    :root { --bg:#12141a; --panel:#1b1f2a; --line:#2a3040; --txt:#e6e9f0; --muted:#8b93a7;
            --game:#48d597; --svc:#5aa0ff; --warn:#ffcf5a; --dead:#ff5a6a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--txt); }
    header { display:flex; align-items:center; gap:12px; padding:12px 16px;
             background:var(--panel); border-bottom:1px solid var(--line); -webkit-app-region:drag; }
    header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.3px; }
    header .spacer { flex:1; }
    header button { -webkit-app-region:no-drag; background:#242a38; color:var(--txt);
             border:1px solid var(--line); border-radius:6px; padding:5px 10px; cursor:pointer; }
    .stats { display:flex; gap:10px; padding:10px 16px; flex-wrap:wrap; }
    .chip { background:var(--panel); border:1px solid var(--line); border-radius:8px;
            padding:8px 12px; min-width:120px; }
    .chip .k { font-size:11px; color:var(--muted); text-transform:uppercase; }
    .chip .v { font-size:18px; font-weight:600; margin-top:2px; }
    .filters { display:flex; gap:6px; padding:0 16px 8px; flex-wrap:wrap; }
    .filters label { font-size:12px; color:var(--muted); display:flex; gap:4px; align-items:center; }
    #log { margin:0 16px 16px; border:1px solid var(--line); border-radius:8px; overflow:auto;
           height:calc(100vh - 210px); background:#0e1016; }
    .row { display:grid; grid-template-columns:78px 190px 1fr; gap:10px; padding:6px 12px;
           border-bottom:1px solid #191d27; font-size:12.5px; }
    .row:hover { background:#141822; }
    .time { color:var(--muted); font-variant-numeric:tabular-nums; }
    .name { font-weight:600; }
    .name.game { color:var(--game); } .name.svc { color:var(--svc); }
    .name.warn { color:var(--warn); } .name.dead { color:var(--dead); }
    .data { color:#c4cad8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .flag { font-weight:600; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Warzone Helper</h1>
    <span class="spacer"></span>
    <button id="clear">Clear</button>
    <button id="close">✕</button>
  </header>

  <div class="stats">
    <div class="chip"><div class="k">Game</div><div class="v" id="s-game">—</div></div>
    <div class="chip"><div class="k">Server</div><div class="v" id="s-server">—</div></div>
    <div class="chip"><div class="k">Ping</div><div class="v" id="s-ping">—</div></div>
    <div class="chip"><div class="k">Health</div><div class="v" id="s-health">—</div></div>
    <div class="chip"><div class="k">Lobby</div><div class="v" id="s-lobby">—</div></div>
    <div class="chip"><div class="k">CoD status</div><div class="v" id="s-status">—</div></div>
  </div>

  <div class="filters" id="filters"></div>
  <div id="log"></div>

  <script src="../js/desktop.js"></script>
</body>
</html>
